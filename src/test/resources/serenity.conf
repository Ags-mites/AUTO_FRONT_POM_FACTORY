serenity {
  project.name = "Sofkianos Kudos POM"
  test.root = "cucumber"
  take.screenshots = FOR_EACH_ACTION
  logging = verbose
}

webdriver {
  driver = chrome
  autodriver = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1920,1080",
        "incognito", "disable-infobars", "disable-default-apps", "disable-popup-blocking"]
    }
  }
}

headless.mode = false

environments {
  default {
    webdriver.base.url = "http://localhost:5173"
    api.producer.base.url = "http://localhost:8082"
    api.consumer.base.url = "http://localhost:8081"
  }
  local {
    webdriver.base.url = "http://localhost:5173"
    api.producer.base.url = "http://localhost:8082"
    api.consumer.base.url = "http://localhost:8081"
  }
}
